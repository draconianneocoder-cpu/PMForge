# nfpm config — builds .deb and .rpm from the Wails Linux binary.
# https://nfpm.goreleaser.com/
#
# Version comes from the $VERSION env var (set by scripts/package-linux.sh
# or the release workflow — the git tag without the leading "v"). nfpm
# expands ${VERSION} from the environment.
#
# Runtime deps are the GTK3 + WebKit2GTK shared libraries the Wails v2 binary
# links when built on Ubuntu 24.04+ with the `webkit2_41` build tag.
# GTK4/WebKitGTK 6.0 is a later Wails migration, not a Wails v2 package tweak.
name: pmforge
arch: amd64
platform: linux
version: ${VERSION}
section: utils
priority: optional
maintainer: The PMForge Contributors <contributors@pmforge.invalid>
vendor: The PMForge Contributors
homepage: https://github.com/draconianneocoder-cpu/PMForge
license: GPL-3.0-or-later
description: |
  PMForge — local-first project controls desktop application.
  Gantt/CPM/EVM scheduling, Six Sigma tools, and encrypted per-project storage.

contents:
  - src: ./build/bin/pmforge
    dst: /usr/bin/pmforge
    file_info:
      mode: 0755
  - src: ./build/linux/pmforge.desktop
    dst: /usr/share/applications/pmforge.desktop
  - src: ./build/appicon.png
    dst: /usr/share/pixmaps/pmforge.png

overrides:
  deb:
    depends:
      - libgtk-3-0
      - libwebkit2gtk-4.1-0
  rpm:
    depends:
      - gtk3
      - webkit2gtk4.1
