# GitHub Actions release pipeline for PMForge — click-installable packages.
#
# Wails does not truly cross-compile, so each OS builds on its native runner:
#   Linux (x86_64)        -> .deb + .rpm (nfpm)
#   Windows (x86_64)      -> NSIS .exe installer (wails build -nsis)
#   macOS (Apple Silicon) -> .dmg (drag-to-Applications)
# A final job attaches everything to a GitHub Release.
#
# Code-signing/notarization is OFF (packages install/run but show OS
# "unidentified developer" warnings). The signing hooks live in
# scripts/package-macos.sh and are enabled by adding certs as CI secrets.
#
# Trigger: push a version tag, e.g. `git tag v1.2.0 && git push origin v1.2.0`.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  GOFLAGS: -mod=readonly
  GOPROXY: https://proxy.golang.org,direct
  CGO_ENABLED: "1"

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Package ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            label: linux/amd64 (.deb/.rpm)
            platform: linux/amd64
          - os: macos-latest
            label: darwin/arm64 (.dmg)
            platform: darwin/arm64
          - os: windows-latest
            label: windows/amd64 (.exe)
            platform: windows/amd64
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev pkg-config

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install nfpm (Linux .deb/.rpm)
        if: runner.os == 'Linux'
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Install create-dmg (macOS)
        if: runner.os == 'macOS'
        run: brew install create-dmg

      - name: Install NSIS (Windows installer)
        if: runner.os == 'Windows'
        run: choco install nsis -y --no-progress

      - name: Stub libdl for mingw (zen-go links -ldl, which Windows lacks)
        if: runner.os == 'Windows'
        run: |
          # The gorules/zen-go CGO dep adds `-ldl` to the link line. libdl is a
          # POSIX library that does not exist on Windows/mingw (Windows uses
          # LoadLibrary, not dlopen), so the link fails with "cannot find -ldl".
          # Drop an empty libdl.a onto gcc's own library search dir so the
          # spurious flag resolves to nothing.
          libdir="$(dirname "$(gcc -print-libgcc-file-name)")"
          ar rcs "$libdir/libdl.a"
          echo "Created empty $libdir/libdl.a to satisfy -ldl"

      - name: Fetch bundled fonts (graceful — app falls back to core fonts)
        continue-on-error: true
        run: bash scripts/fetch-fonts.sh

      - name: Wails build (Linux / macOS)
        if: runner.os != 'Windows'
        run: wails build -platform ${{ matrix.platform }}

      - name: Wails build + NSIS installer (Windows)
        if: runner.os == 'Windows'
        run: wails build -platform windows/amd64 -nsis

      - name: Package Linux (.deb / .rpm)
        if: runner.os == 'Linux'
        run: VERSION="${GITHUB_REF_NAME#v}" bash scripts/package-linux.sh

      - name: Package macOS (.dmg)
        if: runner.os == 'macOS'
        run: VERSION="${GITHUB_REF_NAME#v}" bash scripts/package-macos.sh

      - name: Collect Windows installer
        if: runner.os == 'Windows'
        run: |
          mkdir -p build/packages
          # Wails writes the NSIS installer to build/bin/*-installer.exe. Pick the
          # newest match explicitly so a missing or ambiguous glob fails loudly
          # instead of producing a cryptic cp error or an empty artifact.
          installer="$(ls -t build/bin/*installer*.exe 2>/dev/null | head -1 || true)"
          if [ -z "$installer" ]; then
            echo "release: no NSIS installer found in build/bin (did 'wails build -nsis' run?)." >&2
            ls -la build/bin >&2 || true
            exit 1
          fi
          cp "$installer" "build/packages/PMForge-${GITHUB_REF_NAME#v}-amd64-setup.exe"

      - name: Upload installers
        uses: actions/upload-artifact@v7
        with:
          name: pmforge-${{ matrix.os }}
          path: build/packages/*
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create / update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "PMForge $GITHUB_REF_NAME" \
            --generate-notes \
            dist/*
