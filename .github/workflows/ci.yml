# GitHub Actions CI for PMForge — Go + Svelte (Wails) desktop application.
#
# Faithful translation of the former .gitlab-ci.yml gates:
#   verify   -> `make verify` (Go unit tests + svelte-check + Vite build): the pre-merge gate.
#   build    -> `wails build -platform linux/amd64` smoke build + artifact (GitLab "build" stage).
#   lint     -> golangci-lint + `npm run lint`, non-blocking (GitLab allow_failure: true).
#   security -> `make memory-scan` (go vet + safety scans), non-blocking (GitLab placeholder stage).
#
# The full release gate (`make check-release`) and packaging live in release.yml (on tags).
#
# Two clean-checkout facts shape this file:
#   1. The root `pmforge` package has `//go:embed all:frontend/dist`. `frontend/dist` is
#      gitignored, so it does NOT exist on a fresh checkout — the root package will not
#      compile (test/vet/lint) until the frontend is built. Jobs that compile the root
#      package therefore build the frontend (or stub the embed dir for vet/lint) first.
#   2. The root package links the Wails v2 Linux library. Ubuntu 24.04+ ships
#      WebKit2GTK 4.1, so Linux compile paths use the `webkit2_41` build tag and
#      install libwebkit2gtk-4.1-dev. Wails v2 still links GTK3; GTK4/WebKitGTK
#      6.0 requires a later Wails migration.
#
# Bundled fonts are fetched over the network and degrade gracefully (the app falls back to
# core fonts), so font fetching is never a hard gate here — only release embeds them.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GOFLAGS: -mod=readonly
  GOPROXY: https://proxy.golang.org,direct
  CGO_ENABLED: "1"

jobs:
  verify:
    name: Verify (Go tests + svelte-check + Vite build)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails system dependencies (root package links GTK/WebKit)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Download Go modules
        run: go mod download

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend (creates frontend/dist for //go:embed before go test)
        working-directory: frontend
        run: npm run build

      - name: Pre-merge gate (make verify)
        run: make verify

  build:
    name: Build (Wails, linux/amd64)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Fetch bundled fonts (non-fatal — app falls back to core fonts if a CDN fails)
        continue-on-error: true
        run: make fonts

      # Wails runs `npm install` + `npm run build` itself, creating frontend/dist before
      # compiling Go, so no separate frontend build step is needed here.
      - name: Wails build
        run: wails build -platform linux/amd64 -tags duckdb,webkit2_41

      - name: Upload Linux build
        uses: actions/upload-artifact@v7
        with:
          name: pmforge-linux-amd64
          path: build/bin/
          retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    # Required gate: golangci-lint (v2.12.2) + npm run lint. wails v2.12.0 raised the
    # project's x/tools floor to a Go 1.26-compatible release, so this passes cleanly;
    # a lint regression now fails the workflow.
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails system dependencies (golangci-lint type-checks the root package)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Stub embedded frontend (satisfies //go:embed for type-check; real assets not needed)
        run: |
          mkdir -p frontend/dist
          printf '<!doctype html>\n' > frontend/dist/index.html

      - name: "golangci-lint (scope: . ./internal/...)"
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --build-tags=webkit2_41 . ./internal/...

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

  security:
    name: Security scan (non-blocking)
    runs-on: ubuntu-24.04
    # Mirrors GitLab `security` (allow_failure: true), upgraded from a placeholder to a real scan.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Wails system dependencies (vet compiles the root package)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Stub embedded frontend (satisfies //go:embed for go vet; real assets not needed)
        run: |
          mkdir -p frontend/dist
          printf '<!doctype html>\n' > frontend/dist/index.html

      - name: Memory-safety / vet scan (make memory-scan)
        run: make memory-scan

  vuln:
    name: Vulnerability scan (govulncheck)
    runs-on: ubuntu-24.04
    # Real, blocking dependency-vulnerability gate. `make memory-scan` only runs
    # govulncheck when it happens to be installed and skips silently otherwise, so
    # nothing actually scanned dependencies in CI before this job. govulncheck does
    # call-graph analysis, so it reports only advisories the build can actually reach.
    # If a pre-existing advisory surfaces on first run, patch the dependency (preferred)
    # or temporarily add `continue-on-error: true` here while the fix is prepared.
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Wails system dependencies (govulncheck compiles the root package)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Stub embedded frontend (satisfies //go:embed for the build-time analysis)
        run: |
          mkdir -p frontend/dist
          printf '<!doctype html>\n' > frontend/dist/index.html

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Scan default build (govulncheck ./...)
        run: govulncheck -tags webkit2_41 ./...

      - name: Scan DuckDB analytics engine (-tags duckdb)
        run: govulncheck -tags duckdb,webkit2_41 ./internal/analytics/...

  analytics-duckdb:
    name: Analytics engine (-tags duckdb)
    runs-on: ubuntu-latest
    # Builds and tests the optional DuckDB analytics engine so it can't bitrot.
    # internal/analytics imports duckdb-go (CGO) but not Wails, so no GTK/WebKit
    # is needed; the default-build jobs above never link DuckDB.
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build + test the DuckDB analytics engine
        run: go test -tags duckdb ./internal/analytics/...
