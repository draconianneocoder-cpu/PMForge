# GitHub Actions CI for PMForge — Go + Svelte (Wails) desktop application.
#
# Faithful translation of the former .gitlab-ci.yml gates:
#   verify   -> `make verify` (Go unit tests + svelte-check + Vite build): the pre-merge gate.
#   build    -> `wails build -platform linux/amd64` smoke build + artifact (GitLab "build" stage).
#   lint     -> golangci-lint + `npm run lint`, non-blocking (GitLab allow_failure: true).
#   security -> `make memory-scan` (go vet + safety scans), non-blocking (GitLab placeholder stage).
#
# The full release gate (`make check-release`) and packaging live in release.yml (on tags).
#
# Runner note: the root `pmforge` package imports the Wails v2 library, whose Linux
# build needs GTK3 + WebKit2GTK headers. `make` uses no `webkit2_41` build tag, so we
# pin ubuntu-22.04 (which still ships libwebkit2gtk-4.0-dev) to match the local flow.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GOFLAGS: -mod=readonly
  GOPROXY: https://proxy.golang.org,direct
  CGO_ENABLED: "1"

jobs:
  verify:
    name: Verify (Go tests + svelte-check + Vite build)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails system dependencies (root package links GTK/WebKit)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev pkg-config

      - name: Download Go modules
        run: go mod download

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Fetch bundled fonts
        run: make fonts

      - name: Pre-merge gate (make verify)
        run: make verify

  build:
    name: Build (Wails, linux/amd64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev pkg-config

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.9.2

      - name: Fetch bundled fonts
        run: make fonts

      - name: Wails build
        run: wails build -platform linux/amd64

      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        with:
          name: pmforge-linux-amd64
          path: build/bin/
          retention-days: 7

  lint:
    name: Lint (non-blocking)
    runs-on: ubuntu-22.04
    # Mirrors GitLab `allow_failure: true`: surfaces lint findings without blocking merges.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails system dependencies (golangci-lint type-checks the root package)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev pkg-config

      - name: "golangci-lint (scope: . ./internal/...)"
        uses: golangci/golangci-lint-action@v6
        with:
          args: . ./internal/...

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

  security:
    name: Security scan (non-blocking)
    runs-on: ubuntu-22.04
    # Mirrors GitLab `security` (allow_failure: true), upgraded from a placeholder to a real scan.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Wails system dependencies (vet compiles the root package)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev pkg-config

      - name: Memory-safety / vet scan (make memory-scan)
        run: make memory-scan
