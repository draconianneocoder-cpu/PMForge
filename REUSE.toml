#
# REUSE 3.x annotations for files that cannot carry an inline SPDX
# header. Today that is the bundled TrueType font binaries, which are
# fetched by scripts/fetch-fonts.sh (not committed) and embedded at
# build time. Declaring their licenses here keeps `reuse lint` passing
# once the fonts are present.

version = 1

[[annotations]]
path = "internal/fonts/assets/Liberation*.ttf"
precedence = "aggregate"
SPDX-FileCopyrightText = "Red Hat, Inc. and the Liberation Fonts contributors"
SPDX-License-Identifier = "OFL-1.1"

[[annotations]]
path = "internal/fonts/assets/DejaVu*.ttf"
precedence = "aggregate"
SPDX-FileCopyrightText = "Bitstream Inc., Tavmjong Bah, and the DejaVu Fonts contributors"
SPDX-License-Identifier = "LicenseRef-Bitstream-Vera"

[[annotations]]
path = "internal/fonts/assets/NotoSans*.ttf"
precedence = "aggregate"
SPDX-FileCopyrightText = "The Noto Project Authors (https://github.com/notofonts)"
SPDX-License-Identifier = "OFL-1.1"

[[annotations]]
path = "internal/fonts/assets/SourceSans3*.ttf"
precedence = "aggregate"
SPDX-FileCopyrightText = "Adobe Systems Incorporated"
SPDX-License-Identifier = "OFL-1.1"

[[annotations]]
path = "internal/fonts/assets/JetBrainsMono*.ttf"
precedence = "aggregate"
SPDX-FileCopyrightText = "JetBrains s.r.o. and the JetBrains Mono contributors"
SPDX-License-Identifier = "OFL-1.1"
