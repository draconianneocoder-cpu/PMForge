version: "2"

linters:
  # errcheck, staticcheck, and unused run as part of the golangci-lint v2
  # default set. They were previously disabled for "legacy baseline
  # findings" — but those came from a third-party Go source vendored inside
  # an npm package (frontend/node_modules/flatted/golang/...), which a bare
  # `golangci-lint run` (./...) descends into. Excluding node_modules below
  # removes that noise so the linters apply only to PMForge's own code.
  exclusions:
    paths:
      - node_modules
