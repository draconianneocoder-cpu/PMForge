<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" aria-labelledby="title desc">
  <title id="title">PMForge App Icon - Dark Mode</title>
  <desc id="desc">Square rounded app icon with cyan Gantt/anvil symbol on deep navy background.</desc>
  <!-- Rounded square with subtle shadow (for visual depth) -->
  <defs>
    <filter id="iconshadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="24" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect x="64" y="64" width="896" height="896" rx="220" fill="#0A2540" filter="url(#iconshadow)"/>

  <!-- Centered Gantt/Anvil symbol (scaled) -->
  <g transform="translate(272,248) scale(3.8)">
    <line x1="0" y1="0" x2="0" y2="125" stroke="#A3C4FF" stroke-width="4" opacity="0.75"/>
    <line x1="32" y1="0" x2="32" y2="125" stroke="#A3C4FF" stroke-width="4" opacity="0.75"/>
    <line x1="64" y1="0" x2="64" y2="125" stroke="#A3C4FF" stroke-width="4" opacity="0.75"/>
    <rect x="8" y="8" width="38" height="19" rx="4" fill="#00D4FF"/>
    <rect x="8" y="34" width="58" height="19" rx="4" fill="#00D4FF"/>
    <rect x="8" y="60" width="88" height="19" rx="4" fill="#00D4FF"/>
    <rect x="8" y="86" width="118" height="19" rx="4" fill="#00D4FF"/>
    <polygon points="8,115 28,115 38,135 88,135 98,115" fill="#00D4FF"/>
  </g>
</svg>
