# GitLab CI/CD configuration for PMForge
# This builds and tests the Go + Svelte application

stages:
  - build
  - test
  - release

variables:
  # Go configuration
  GOFLAGS: "-mod=readonly"
  GOPROXY: "https://proxy.golang.org,direct"
  # Node configuration
  NODE_ENV: "production"

cache:
  paths:
    - go/pkg/mod/
    - frontend/node_modules/
    - internal/fonts/assets/

before_script:
  # Install Go dependencies
  - go mod tidy
  # Install Node dependencies. Use a subshell so the working directory
  # returns to the repo root for the steps that follow (otherwise `make`
  # would run from frontend/ and fail).
  - (cd frontend && npm ci)
  # Download fonts if needed
  - make fonts

build:
  stage: build
  script:
    # Wails CLI builds the frontend, injects desktop,production tags, links
    # platform frameworks, and embeds the UI. The main package is at the repo
    # root (Wails requirement), so no package path is needed.
    - wails build -platform linux/amd64
  artifacts:
    paths:
      - build/bin/
    expire_in: 1 week

test:
  stage: test
  script:
    # Single source of truth for the pre-merge gate: Go unit tests +
    # svelte-check (type/warning clean) + the frontend Vite build. This is
    # the same `make verify` developers run locally, so CI and local stay
    # in lockstep and can't drift. (The full release gate lives in
    # `make check-release`, run on tags.)
    - make verify

release:
  stage: release
  script:
    - echo "Creating release artifacts..."
    - mkdir -p release
    - wails build -platform linux/amd64
    - cp build/bin/pmforge release/
    - tar -czvf release/pmforge-linux-amd64.tar.gz -C build/bin pmforge
    - wails build -platform darwin/amd64 -o release/pmforge-darwin-amd64
    - wails build -platform windows/amd64 -o release/pmforge-windows-amd64.exe
  artifacts:
    paths:
      - release/
    expire_in: 1 week
  only:
    - tags
    - main

# Code quality checks
lint:
  stage: test
  script:
    # Go linting
    - golangci-lint run ./...
    # Frontend linting
    - cd frontend && npm run lint
  allow_failure: true  # Allow failure if linters not installed

# Security scanning
security:
  stage: test
  script:
    - echo "Running security scans..."
    # Add security scanning tools here if desired
  allow_failure: true
